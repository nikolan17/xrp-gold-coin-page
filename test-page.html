<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Test Product Page</title>
<style>
  body {
    font-family: Georgia, serif;
    background: #f5f5f5;
    margin: 0; padding: 0;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 48px 56px;
    max-width: 520px;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  .product-img {
    width: 120px; height: 120px;
    background: radial-gradient(circle at 35% 35%, #ffe066, #c9a84c, #7a5c10);
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
    box-shadow: 0 4px 20px rgba(201,168,76,.4);
  }
  h1 { font-size: 26px; margin: 0 0 8px; color: #1a1a2e; }
  .price { font-size: 32px; font-weight: bold; color: #c9a84c; margin: 16px 0; }
  p { color: #555; line-height: 1.6; margin: 0 0 28px; font-size: 15px; }

  .buy-btn {
    display: inline-block;
    background: #0D132D;
    color: #ffd700;
    padding: 14px 40px;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: .04em;
    transition: background .2s;
    /* aff-link class is what the tracker looks for */
  }
  .buy-btn:hover { background: #1b2550; }

  .ref-info {
    margin-top: 28px;
    padding: 12px 16px;
    background: #f9f5e7;
    border: 1px solid #e8d77a;
    border-radius: 6px;
    font-size: 13px;
    color: #666;
    font-family: monospace;
  }
  .ref-info span { color: #c9a84c; font-weight: bold; }
</style>
</head>
<body>

<div class="card">
  <div class="product-img">🪙</div>
  <h1>XRP Gold Coin</h1>
  <div class="price">$99.00</div>
  <p>This is a test product page. The buy button below will point to whatever
  store link the admin assigned to the affiliate in the URL.</p>

  <!--
    class="aff-link" is the hook — the tracker replaces this href
    with the affiliate's store link when ?ref=CODE is in the URL.
    Default href is your main store link (used when no ?ref= is present).
  -->
  <a href="https://qfsmagastore.com" class="buy-btn aff-link" target="_blank">
    Buy Now
  </a>

  <!-- Shows which affiliate is active — useful for testing -->
  <div class="ref-info" id="ref-info">
    No affiliate code in URL. Default store link is active.
  </div>
</div>

<!-- Tracker runs after page loads -->
<script src="affiliate-tracker.js"></script>
<script>
  // Update the info box to show what the tracker found
  window.addEventListener('load', function() {
    var info = document.getElementById('ref-info');
    var t = window.AffiliateTracker;
    if (t && t.affiliate) {
      info.innerHTML = 'Affiliate active: <span>' + t.affiliate.name + ' (' + t.affiliate.code + ')</span><br/>Buy button → <span>' + t.affiliate.storeLink + '</span>';
    } else if (t && t.code) {
      info.innerHTML = 'Code <span>' + t.code + '</span> not found in affiliate list. Default link used.';
    }
  });
</script>

</body>
</html>
